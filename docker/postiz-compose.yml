# Self-hosted Postiz — the $0/mo posting queue with true drafts.
# docker compose -f postiz-compose.yml up -d   → http://localhost:4200
# Docs: https://docs.postiz.com/installation/docker-compose
services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: always
    environment:
      MAIN_URL: "http://localhost:4200"
      FRONTEND_URL: "http://localhost:4200"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:3000"
      JWT_SECRET: "CHANGE-ME-random-long-string"
      DATABASE_URL: "postgresql://postiz:postiz-local-pw@postiz-postgres:5432/postiz"
      REDIS_URL: "redis://postiz-redis:6379"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      IS_GENERAL: "true"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - 4200:4200
      - 3000:3000
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: postiz-local-pw
      POSTGRES_USER: postiz
      POSTGRES_DB: postiz
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postiz -d postiz
      interval: 10s
      timeout: 3s
      retries: 3
  postiz-redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
